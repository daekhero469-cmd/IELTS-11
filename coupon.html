<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쿠폰 등록 | IELTS 11</title>
    <link rel="stylesheet" href="pages.css?v=mobile-nav-1" />
    <script src="theme.js?v=theme-1"></script>
    <style>
      body {
        background: #f6f8fb;
      }

      .coupon-shell {
        display: grid;
        min-height: calc(100vh - 77px);
        grid-template-columns: minmax(0, 1fr) 430px;
        gap: 34px;
        align-items: center;
        max-width: 1120px;
        margin: 0 auto;
        padding: 54px 20px;
      }

      .coupon-hero {
        border-radius: 8px;
        padding: clamp(32px, 6vw, 64px);
        color: #fff;
        background:
          linear-gradient(90deg, rgba(7, 23, 57, 0.94), rgba(15, 107, 255, 0.72)),
          url("https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=1600&q=80")
            center / cover;
      }

      .coupon-hero h1 {
        margin: 14px 0;
        font-size: clamp(44px, 7vw, 76px);
        line-height: 1;
      }

      .coupon-hero p {
        max-width: 620px;
        margin: 0;
        color: rgba(255, 255, 255, 0.84);
        font-size: 20px;
        line-height: 1.55;
        font-weight: 700;
      }

      .coupon-form {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 28px;
        background: #fff;
        box-shadow: 0 18px 44px rgba(16, 24, 40, 0.12);
      }

      .coupon-form h2 {
        margin: 0 0 8px;
        font-size: 30px;
      }

      .coupon-form .desc {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.5;
        font-weight: 650;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .field label {
        font-size: 14px;
        font-weight: 900;
      }

      .field input,
      .field select {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        font: inherit;
        font-weight: 650;
        background: #fff;
      }

      .coupon-code {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 20px 0;
        border: 1px dashed var(--brand);
        border-radius: 8px;
        padding: 16px;
        background: #eef5ff;
      }

      .coupon-code strong {
        font-size: 22px;
      }

      .coupon-code span {
        color: var(--brand);
        font-size: 14px;
        font-weight: 950;
      }

      .submit-btn {
        display: inline-flex;
        width: 100%;
        min-height: 54px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--brand);
        border-radius: 8px;
        color: #fff;
        background: var(--brand);
        font-weight: 950;
      }

      .form-note {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        font-weight: 700;
      }

      @media (max-width: 900px) {
        .coupon-shell {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="nav">
      <a class="brand" href="index.html"><span class="brand-mark">I</span>IELTS 11</a>
      <nav class="nav-actions">
        <a class="category-link" href="today-mission.html">✓ 오늘 미션</a>
        <a class="category-link" href="beginner.html">1 개초급</a>
        <a class="category-link" href="beginner-2.html">2 개초급</a>
        <a class="category-link" href="intermediate.html">2 어나더 중급</a>
        <a class="category-link" href="advanced-2xl.html">XL 2XL상급</a>
        <a class="login-link" href="login.html">로그인</a>
      </nav>
    </header>

    <main class="coupon-shell">
      <section class="coupon-hero">
        <p class="eyebrow">77% Coupon Event</p>
        <h1>쿠폰 등록</h1>
        <p>IELTS 11 첫 수강 혜택을 등록하고, 현재 실력에 맞는 레벨 진단을 이어서 신청하세요.</p>
      </section>

      <section class="coupon-form" aria-label="쿠폰 등록 양식">
        <h2>77% 쿠폰 받기</h2>
        <p class="desc">아래 정보를 입력하면 상담 시 쿠폰 적용 대상으로 확인됩니다.</p>

        <form>
          <div class="field">
            <label for="name">이름</label>
            <input id="name" name="name" type="text" placeholder="홍길동" />
          </div>
          <div class="field">
            <label for="phone">연락처</label>
            <input id="phone" name="phone" type="tel" placeholder="010-0000-0000" />
          </div>
          <div class="field">
            <label for="level">현재 레벨</label>
            <select id="level" name="level">
              <option>개초급</option>
              <option>어나더 중급</option>
              <option>2XL상급</option>
              <option>아직 모름</option>
            </select>
          </div>

          <div class="coupon-code">
            <div>
              <span>자동 적용 쿠폰</span>
              <strong>IELTS77</strong>
            </div>
            <span>77% 혜택</span>
          </div>

          <button class="submit-btn" type="button">쿠폰 등록하기</button>
        </form>
        <p class="form-note">현재는 화면용 양식입니다. 실제 저장/발송은 서버 연결 후 동작합니다.</p>
      </section>
    </main>
  </body>
</html>
